name: resnet_unet
family: CNN

# I/O
in_channels: ${dataset.in_channels}
out_channels: ${task.out_channels}

# Pretrained model
# IMPORTANT: Only file name, not full path
# can be null or "" to disable pretrained loading
pretrained_ckpt: null

encoder: ResNet34
depth: 0
drop_rate: 0


n_skip: 4
hidden_layers: 512
head_channels: 512

decoder_channels: [256, 128, 64, 16]
skip_channels: [256, 128, 64, 64]
