# configs/config.yaml
defaults:
  - model: resunet
  - dataset: isic2017
  - task: binary
  - inspect: default
  - logging: mlflow
  - train: default
  - eval: default
  - _self_

project:
  name: unet_variants
  classifier: seg
  device: cuda
  seed: 42
  image_size: 224
  batch_size: 32
  num_workers: 1
  epochs: 300
  use_pretrained_ckpt: False

# NEW: paths group (works everywhere)
paths:
  # repo root when running scripts (Hydra may chdir; we keep chdir false so cwd stays stable)
  repo_root: ${oc.env:UNET_VARIANTS_ROOT}
  data_dir: ${paths.repo_root}/data
  pretrained_ckpt: ${paths.repo_root}/pretrained_ckpt/${model.pretrained_ckpt}
  runs_dir: ${paths.repo_root}/runs
  report_dir: ${paths.runs_dir}/reports

hydra:
  run:
    # Single-run outputs (already in your config)
    dir: ${paths.runs_dir}/hydraruns/${now:%Y-%m-%d}/${model.name}_${dataset.name}_${now:%H-%M-%S}
  sweep:
    # Parent directory for a multirun (one folder per sweep)
    dir: ${paths.runs_dir}/hydrasweeps/${now:%Y-%m-%d}/${dataset.name}_${now:%H-%M-%S}
    # Subdirectory template for each job in the sweep
    # Include model/dataset and a unique counter to avoid collisions
    subdir: ${hydra.job.num}_${model.name}
  job:
    chdir: false
