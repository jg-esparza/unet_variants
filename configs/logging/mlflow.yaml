# configs/logging/mlflow.yaml
backend: mlflow
enable: True

tracking_uri: "sqlite:///mlflow.db"

mlruns_path: ${paths.repo_root}/mlruns
experiment_name: seg_${dataset.name}_${dataset.image_size}
run_name: ${model.name}_bs${train.batch_size}_lr${train.optim.params.lr}_seed${project.seed}
run_id: null # for resume training
model_name: ${model.name}_im${dataset.image_size}

system_metrics: True

tags:
  framework: pytorch
  task: ${dataset.task}
  dataset: ${dataset.name}
  image_size: ${dataset.image_size}
  model_family: ${model.family}
  loss_type: ${train.loss.name}
  seed: ${train.seed}
  total_params: null
  augmentation: ${project.augmentation}


params:
  model: ${model.name}
  loss_fn: ${train.loss.name}
  optimizer: ${train.optim.name}
  lr: ${train.optim.params.lr}
  weight_decay: ${train.optim.params.weight_decay}
  scheduler: ${train.scheduler.name}
  batch_size: ${train.batch_size}
  image_size: ${dataset.image_size}
  epochs: ${train.epochs}
  mixed_precision: ${train.amp}
  trainable_params: None
  flops: None
  macs: None
  # augmentation: ${}

save_model_summary: True
export_onnx: True
